<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke Packing | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* ÉCRAN D'ENTRÉE 18 ANS */
        #age-gate {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 4px solid #ff0000;
        }

        /* BOUTONS AGE GATE */
        .btn-entry { 
            background: #ff0000; 
            color: white; 
            padding: 15px 40px; 
            font-weight: 900; 
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-entry:hover { transform: scale(1.1); background: #cc0000; }

        /* BOUTIQUE (CACHÉE AU DÉBUT) */
        #shop-content { display: none; }

        .product-card { background: #111; border: 1px solid #222; transition: 0.3s; }
        .product-card:hover { border-color: #ff0000; }
        
        /* PANIER */
        #cart-modal { display: none !important; }
        #cart-modal.active { display: flex !important; background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>

    <div id="age-gate">
        <h1 class="text-5xl font-black text-red-600 italic mb-4">SMOKE PACKING</h1>
        <p class="text-xl mb-8 uppercase tracking-widest">Avez-vous plus de 18 ans ?</p>
        <div class="flex gap-6">
            <button onclick="unlock()" class="btn-entry">OUI, J'AI 18 ANS</button>
            <button onclick="window.location.href='https://google.com'" class="bg-zinc-800 px-8 py-4 rounded font-bold text-gray-400">NON</button>
        </div>
        <p class="mt-10 text-xs text-zinc-600 italic underline">L'accès à ce site est strictement réglementé.</p>
    </div>

    <div id="shop-content">
        <header class="p-4 border-b border-zinc-900 flex justify-between items-center sticky top-0 bg-black z-50">
            <h1 class="text-2xl font-black text-red-600 italic">SMOKE PACKING</h1>
            <button onclick="toggleCart()" class="bg-red-600 px-5 py-2 rounded-lg font-bold text-sm">
                🛒 COMMANDER (<span id="count">0</span>)
            </button>
        </header>

        <main class="container mx-auto p-6 lg:p-12">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="product-grid">
                </div>
        </main>
    </div>

    <div id="cart-modal" class="fixed inset-0 z-[100] items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-md rounded-xl border border-zinc-800 overflow-hidden shadow-2xl">
            <div class="p-4 bg-zinc-800 text-center font-bold text-red-500 border-b border-zinc-700">LISTE DE COMMANDE</div>
            <div id="cart-list" class="p-6 max-h-[300px] overflow-y-auto space-y-3"></div>
            <div class="p-6 border-t border-zinc-800 bg-black">
                <div class="flex justify-between text-2xl font-black mb-6 text-white">
                    <span>TOTAL:</span>
                    <span class="text-red-600"><span id="cart-total">0</span> FCFA</span>
                </div>
                <button onclick="sendOrder()" class="w-full bg-green-600 py-4 rounded-lg font-bold text-white uppercase">Finaliser sur WhatsApp</button>
                <button onclick="toggleCart()" class="w-full text-zinc-500 mt-4 text-xs">RETOUR</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Breeze Pro", taffs: "2000", price: 7500, img: "https://vapewh.com/cdn/shop/products/Breeze-Pro-Disposable-2000-Puffs-Lush-Ice_600x.jpg" },
            { id: 2, name: "Breeze Elite", taffs: "4000", price: 10000, img: "https://vapewh.com/cdn/shop/products/Breeze-Elite-Disposable-4000-Puffs-Blue-Raspberry_600x.jpg" },
            { id: 3, name: "Vozol Star 12k", taffs: "12000", price: 18000, img: "https://vapewh.com/cdn/shop/files/Vozol-Star-12000-Blueberry-Storm_600x.jpg" },
            { id: 4, name: "Vozol Vista 20k", taffs: "20000", price: 22000, img: "https://vapewh.com/cdn/shop/files/Vozol-Vista-20000-Sour-Apple-Ice_600x.jpg" }
        ];

        let panier = [];

        // DÉBLOQUER LE SITE
        function unlock() {
            document.getElementById('age-gate').style.display = 'none';
            document.getElementById('shop-content').style.display = 'block';
            document.body.style.overflow = 'auto'; // Réactive le défilement
            render();
        }

        function render() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card rounded-2xl p-4">
                    <div class="h-48 bg-white rounded-lg mb-4 flex items-center justify-center p-2">
                        <img src="${p.img}" class="max-h-full object-contain" alt="${p.name}">
                    </div>
                    <h3 class="text-xl font-bold">${p.name}</h3>
                    <p class="text-red-600 font-bold mb-4">${p.taffs} Taffs</p>
                    <div class="flex justify-between items-center">
                        <span class="text-xl font-black">${p.price.toLocaleString()} FCFA</span>
                        <button onclick="add(${p.id})" class="bg-white text-black w-10 h-10 rounded-lg font-bold hover:bg-red-600 hover:text-white transition">＋</button>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            panier.push(products.find(x => x.id === id));
            update();
        }

        function update() {
            document.getElementById('count').innerText = panier.length;
            const list = document.getElementById('cart-list');
            const total = panier.reduce((s, i) => s + i.price, 0);
            list.innerHTML = panier.map((item, i) => `
                <div class="flex justify-between items-center bg-zinc-800 p-3 rounded-lg text-white">
                    <span class="text-sm font-bold">${item.name}</span>
                    <button onclick="remove(${i})" class="text-red-500">✕</button>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function remove(i) { panier.splice(i, 1); update(); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('active'); }

        function sendOrder() {
            if(panier.length === 0) return;
            let m = "📦 NOUVELLE COMMANDE SMOKE PACKING :\n";
            panier.forEach(p => m += `- ${p.name} (${p.taffs} t) : ${p.price} FCFA\n`);
            window.open(`https://wa.me/22500000000?text=${encodeURIComponent(m)}`);
        }
    </script>
</body>
</html>
