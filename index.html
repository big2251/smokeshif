<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke Packing | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Inter', sans-serif; }
        .product-card { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            transition: all 0.3s ease;
        }
        .product-card:hover { 
            border-color: #ff4444; 
            transform: translateY(-5px);
        }
        /* Style du modal panier */
        #cart-modal { 
            display: none; 
            background: rgba(0,0,0,0.9); 
        }
        #cart-modal.active { display: flex; }
    </style>
</head>
<body>

    <header class="p-5 border-b border-zinc-800 flex justify-between items-center sticky top-0 bg-black z-50">
        <div>
            <h1 class="text-2xl font-black text-red-600 italic leading-none">SMOKE PACKING</h1>
            <span class="text-[10px] text-zinc-500 tracking-widest uppercase">Premium Vape Shop</span>
        </div>
        
        <button onclick="toggleCart()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-full font-bold shadow-lg flex items-center gap-2 transition">
            <span>🛒</span> 
            <span>COMMANDER (<span id="cart-count">0</span>)</span>
        </button>
    </header>

    <main class="container mx-auto p-6 lg:p-12">
        <h2 class="text-center text-gray-400 mb-10 italic uppercase tracking-widest">Nos Arrivages Breeze & Vozol</h2>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="items-grid">
            </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 z-[100] items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-md rounded-2xl border border-zinc-700 overflow-hidden shadow-2xl">
            <div class="p-4 bg-zinc-800 text-center font-bold border-b border-zinc-700 text-red-500">
                LISTE DE COMMANDE
            </div>
            
            <div id="cart-list" class="p-6 max-h-[300px] overflow-y-auto space-y-4 text-white">
                </div>
            
            <div class="p-6 border-t border-zinc-700 bg-black">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span>TOTAL</span>
                    <span class="text-red-500"><span id="cart-total">0</span> FCFA</span>
                </div>
                <button onclick="sendOrder()" class="w-full bg-green-600 py-4 rounded-xl font-bold hover:bg-green-500 transition text-white shadow-lg">
                    VALIDER VIA WHATSAPP
                </button>
                <button onclick="toggleCart()" class="w-full text-zinc-500 mt-4 text-sm hover:underline">
                    Fermer et continuer
                </button>
            </div>
        </div>
    </div>

    <script>
        // Catalogue des produits
        const stock = [
            { id: 1, name: "Breeze Pro", puffs: "2000 Taffs", price: 7500, brand: "Breeze", img: "https://breezesmoke.com/cdn/shop/files/Breeze_Pro_Cherry_Lemon_300x.png" },
            { id: 2, name: "Breeze Elite", puffs: "4000 Taffs", price: 10000, brand: "Breeze", img: "https://vape-brands.com/wp-content/uploads/2023/10/Breeze-Elite-Strawberry-Peach-Mint.jpg" },
            { id: 3, name: "Breeze Prime", puffs: "6000 Taffs", price: 14000, brand: "Breeze", img: "https://breezesmoke.com/cdn/shop/files/Breeze_Prime_Product_Images_Strawberry_Apple_Watermelon_300x.png" },
            { id: 4, name: "Vozol Star", puffs: "12000 Taffs", price: 18000, brand: "Vozol", img: "https://vozol-vapes.com/wp-content/uploads/2023/12/VOZOL-Star-12000-Strawberry-Ice-Cream.jpg" },
            { id: 5, name: "Vozol Vista", puffs: "20000 Taffs", price: 22000, brand: "Vozol", img: "https://vozol-vapes.com/wp-content/uploads/2024/04/VOZOL-Vista-20000-Cherry-Cola.jpg" },
            { id: 6, name: "Vozol Gear", puffs: "40000 Taffs", price: 28000, brand: "Vozol", img: "https://m.media-amazon.com/images/I/61M07Kj6C3L.jpg" }
        ];

        let panier = [];

        // 1. Afficher les produits au chargement
        function render() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = stock.map(p => `
                <div class="product-card rounded-2xl p-5">
                    <div class="h-52 bg-white rounded-xl mb-4 overflow-hidden flex items-center justify-center p-4">
                        <img src="${p.img}" alt="${p.name}" class="max-h-full object-contain">
                    </div>
                    <div class="space-y-1">
                        <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter">${p.brand}</p>
                        <h3 class="text-xl font-bold">${p.name}</h3>
                        <p class="text-red-500 text-sm font-medium italic">${p.puffs}</p>
                    </div>
                    <div class="mt-6 flex justify-between items-center">
                        <span class="text-2xl font-black">${p.price.toLocaleString()} <small class="text-xs">FCFA</small></span>
                        <button onclick="addToPanier(${p.id})" class="bg-white text-black w-10 h-10 rounded-full font-bold hover:bg-red-600 hover:text-white transition shadow-lg">
                            ＋
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // 2. Gestion du panier
        function addToPanier(id) {
            const item = stock.find(x => x.id === id);
            panier.push(item);
            updateUI();
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = panier.length;
            const list = document.getElementById('cart-list');
            const total = panier.reduce((sum, item) => sum + item.price, 0);
            
            if(panier.length === 0) {
                list.innerHTML = `<p class="text-center text-zinc-500">Aucun article sélectionné.</p>`;
            } else {
                list.innerHTML = panier.map((item, index) => `
                    <div class="flex justify-between items-center bg-zinc-800 p-3 rounded-xl">
                        <div>
                            <p class="text-sm font-bold">${item.name}</p>
                            <p class="text-[10px] text-red-500">${item.price} FCFA</p>
                        </div>
                        <button onclick="remove(${index})" class="text-zinc-500 hover:text-white px-2 text-xl">✕</button>
                    </div>
                `).join('');
            }
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function remove(index) {
            panier.splice(index, 1);
            updateUI();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
        }

        // 3. Envoi WhatsApp
        function sendOrder() {
            if(panier.length === 0) return alert("Le panier est vide !");
            let text = "📦 *NOUVELLE COMMANDE SMOKE PACKING*\n\n";
            panier.forEach(c => text += `• ${c.name} (${c.puffs}) - ${c.price} FCFA\n`);
            text += `\n💰 *TOTAL : ${panier.reduce((a,b)=>a+b.price,0)} FCFA*`;
            
            const monNumero = "2250000000000"; // CHANGE PAR TON NUMERO ICI
            window.open(`https://wa.me/${monNumero}?text=${encodeURIComponent(text)}`);
        }

        // Lancer l'affichage direct
        render();
    </script>
</body>
</html>
