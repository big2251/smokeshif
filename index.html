<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke Packing | Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', sans-serif; }
        .product-card { background: #111; border: 1px solid #222; transition: 0.3s; }
        .product-card:hover { border-color: #ff0000; transform: translateY(-5px); }
        
        /* Assure que le panier est invisible au départ */
        #cart-modal { display: none !important; }
        #cart-modal.active { display: flex !important; background: rgba(0,0,0,0.95); }
    </style>
</head>
<body>

    <header class="p-4 border-b border-zinc-900 flex justify-between items-center sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-black text-red-600 italic">SMOKE PACKING</h1>
        
        <button onclick="toggleCart()" class="bg-red-600 hover:bg-red-700 px-5 py-2 rounded-lg font-bold text-sm transition">
            🛒 COMMANDER (<span id="cart-count">0</span>)
        </button>
    </header>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="items-grid">
            </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 z-[100] items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-md rounded-xl border border-zinc-800 overflow-hidden shadow-2xl">
            <div class="p-4 bg-zinc-800 text-center font-bold text-red-500 border-b border-zinc-700">
                MA COMMANDE
            </div>
            <div id="cart-list" class="p-6 max-h-[300px] overflow-y-auto space-y-3">
                </div>
            <div class="p-6 border-t border-zinc-800 bg-black">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span>TOTAL:</span>
                    <span class="text-red-600"><span id="cart-total">0</span> FCFA</span>
                </div>
                <button onclick="sendWhatsApp()" class="w-full bg-green-600 py-4 rounded-lg font-bold hover:bg-green-500 transition">
                    ENVOYER SUR WHATSAPP
                </button>
                <button onclick="toggleCart()" class="w-full text-zinc-500 mt-4 text-xs">RETOUR À LA BOUTIQUE</button>
            </div>
        </div>
    </div>

    <script>
        // Catalogue
        const puffs = [
            { id: 1, name: "Breeze Pro", taffs: "2000", price: 7500, img: "https://breezesmoke.com/cdn/shop/files/Breeze_Pro_Cherry_Lemon_300x.png" },
            { id: 2, name: "Breeze Elite", taffs: "4000", price: 10000, img: "https://vape-brands.com/wp-content/uploads/2023/10/Breeze-Elite-Strawberry-Peach-Mint.jpg" },
            { id: 3, name: "Vozol Star", taffs: "12000", price: 18000, img: "https://vozol-vapes.com/wp-content/uploads/2023/12/VOZOL-Star-12000-Strawberry-Ice-Cream.jpg" },
            { id: 4, name: "Vozol Vista", taffs: "20000", price: 22000, img: "https://vozol-vapes.com/wp-content/uploads/2024/04/VOZOL-Vista-20000-Cherry-Cola.jpg" }
        ];

        let panier = [];

        // Affiche les produits DIRECTEMENT
        function render() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = puffs.map(p => `
                <div class="product-card rounded-xl p-4">
                    <div class="h-48 bg-white rounded-lg mb-4 flex items-center justify-center p-4">
                        <img src="${p.img}" class="max-h-full object-contain">
                    </div>
                    <h3 class="text-lg font-bold">${p.name}</h3>
                    <p class="text-red-600 text-sm mb-4">${p.taffs} Taffs</p>
                    <div class="flex justify-between items-center">
                        <span class="text-xl font-black">${p.price.toLocaleString()} FCFA</span>
                        <button onclick="add(${p.id})" class="bg-white text-black w-10 h-10 rounded-lg font-bold hover:bg-red-600 hover:text-white transition">＋</button>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            const item = puffs.find(x => x.id === id);
            panier.push(item);
            update();
        }

        function update() {
            document.getElementById('cart-count').innerText = panier.length;
            const list = document.getElementById('cart-list');
            const total = panier.reduce((s, i) => s + i.price, 0);
            
            list.innerHTML = panier.map((item, i) => `
                <div class="flex justify-between items-center bg-zinc-800 p-3 rounded-lg">
                    <span class="text-sm">${item.name}</span>
                    <button onclick="remove(${i})" class="text-red-500">✕</button>
                </div>
            `).join('');
            document.getElementById('cart-total').innerText = total.toLocaleString();
        }

        function remove(i) {
            panier.splice(i, 1);
            update();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('active');
        }

        function sendWhatsApp() {
            if(panier.length === 0) return alert("Panier vide");
            let t = "🚀 COMMANDE SMOKE PACKING\n";
            panier.forEach(p => t += `- ${p.name} : ${p.price} FCFA\n`);
            window.open(`https://wa.me/22500000000?text=${encodeURIComponent(t)}`);
        }

        render(); // Lance l'affichage direct
    </script>
</body>
</html>
