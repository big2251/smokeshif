<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke Packing | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .card { background: #111; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: #ff0000; }
        #cart-modal { display: none !important; }
        #cart-modal.active { display: flex !important; background: rgba(0,0,0,0.9); }
        img { min-height: 150px; background: #fff; } /* Fond blanc pour voir la puff même si l'image charge mal */
    </style>
</head>
<body>

    <header class="p-4 border-b border-zinc-900 flex justify-between items-center sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-black text-red-600 italic">SMOKE PACKING</h1>
        <button onclick="toggle()" class="bg-red-600 px-5 py-2 rounded-lg font-bold text-sm">
            🛒 PANIER (<span id="count">0</span>)
        </button>
    </header>

    <main class="container mx-auto p-6 lg:p-12">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="grid"></div>
    </main>

    <div id="cart-modal" class="fixed inset-0 z-[100] items-center justify-center p-4 text-black">
        <div class="bg-white w-full max-w-md rounded-xl overflow-hidden">
            <div class="p-4 bg-gray-100 text-center font-bold">VOTRE PANIER</div>
            <div id="list" class="p-6 max-h-[300px] overflow-y-auto space-y-3"></div>
            <div class="p-6 border-t">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span>TOTAL:</span>
                    <span class="text-red-600"><span id="total">0</span> FCFA</span>
                </div>
                <button onclick="send()" class="w-full bg-green-600 text-white py-4 rounded-lg font-bold uppercase">Commander via WhatsApp</button>
                <button onclick="toggle()" class="w-full text-gray-400 mt-4 text-xs uppercase">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        // Liens d'images testés sur serveurs stables
        const products = [
            { id: 1, name: "Breeze Pro", taffs: "2000", price: 7500, img: "https://vapewh.com/cdn/shop/products/Breeze-Pro-Disposable-2000-Puffs-Lush-Ice_600x.jpg" },
            { id: 2, name: "Breeze Elite", taffs: "4000", price: 10000, img: "https://vapewh.com/cdn/shop/products/Breeze-Elite-Disposable-4000-Puffs-Blue-Raspberry_600x.jpg" },
            { id: 3, name: "Vozol Star 12k", taffs: "12000", price: 18000, img: "https://vapewh.com/cdn/shop/files/Vozol-Star-12000-Blueberry-Storm_600x.jpg" },
            { id: 4, name: "Vozol Vista 20k", taffs: "20000", price: 22000, img: "https://vapewh.com/cdn/shop/files/Vozol-Vista-20000-Sour-Apple-Ice_600x.jpg" },
            { id: 5, name: "Vozol Gear 10k", taffs: "10000", price: 15000, img: "https://vapewh.com/cdn/shop/products/Vozol-Gear-10000-Blue-Razz-Ice_600x.jpg" },
            { id: 6, name: "Breeze Prime", taffs: "6000", price: 14000, img: "https://vapewh.com/cdn/shop/files/Breeze-Prime-6000-Puffs-Strawberry-Apple-Watermelon_600x.jpg" }
        ];

        let panier = [];

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = products.map(p => `
                <div class="card rounded-2xl p-4 flex flex-col items-center">
                    <img src="${p.img}" class="w-full object-contain rounded-lg mb-4" alt="${p.name}">
                    <h3 class="text-lg font-bold self-start">${p.name}</h3>
                    <p class="text-red-500 font-bold text-sm self-start mb-4">${p.taffs} TAFFS</p>
                    <div class="flex justify-between w-full items-center mt-auto">
                        <span class="text-xl font-black">${p.price.toLocaleString()} FCFA</span>
                        <button onclick="add(${p.id})" class="bg-white text-black px-4 py-2 rounded-lg font-bold hover:bg-red-600 hover:text-white transition">＋</button>
                    </div>
                </div>
            `).join('');
        }

        function add(id) {
            panier.push(products.find(x => x.id === id));
            update();
        }

        function update() {
            document.getElementById('count').innerText = panier.length;
            const list = document.getElementById('list');
            const sum = panier.reduce((a, b) => a + b.price, 0);
            list.innerHTML = panier.map((item, i) => `
                <div class="flex justify-between items-center border-b pb-2">
                    <span class="font-bold text-sm">${item.name}</span>
                    <button onclick="remove(${i})" class="text-red-500 font-bold">✕</button>
                </div>
            `).join('');
            document.getElementById('total').innerText = sum.toLocaleString();
        }

        function remove(i) { panier.splice(i, 1); update(); }
        function toggle() { document.getElementById('cart-modal').classList.toggle('active'); }

        function send() {
            if(panier.length === 0) return;
            let m = "COMMANDE SMOKE PACKING:\n";
            panier.forEach(p => m += `- ${p.name} : ${p.price} CFA\n`);
            window.open(`https://wa.me/22500000000?text=${encodeURIComponent(m)}`);
        }

        render();
    </script>
</body>
</html>
